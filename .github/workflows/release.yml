name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Copy frontend build into backend for bundling
      - name: Bundle frontend
        run: |
          Copy-Item -Recurse frontend/dist backend/app/static
        shell: pwsh

      # Build backend executable
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --no-install-project
          uv pip install pyinstaller
      - name: Build executable
        working-directory: backend
        run: uv run pyinstaller engram.spec
      - name: Package
        run: Compress-Archive -Path backend/dist/engram -DestinationPath engram-windows-x64.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: engram-windows-x64
          path: engram-windows-x64.zip

  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Copy frontend build into backend for bundling
      - name: Bundle frontend
        run: cp -r frontend/dist backend/app/static

      # Build backend executable
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --no-install-project
          uv pip install pyinstaller
      - name: Build executable
        working-directory: backend
        run: uv run pyinstaller engram.spec
      - name: Package
        run: tar -czf engram-linux-x64.tar.gz -C backend/dist engram
      - uses: actions/upload-artifact@v4
        with:
          name: engram-linux-x64
          path: engram-linux-x64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: engram-windows-x64
      - uses: actions/download-artifact@v4
        with:
          name: engram-linux-x64
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            engram-windows-x64.zip
            engram-linux-x64.tar.gz
