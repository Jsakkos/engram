name: Download Stats

on:
  release:
    types: [published]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: download-stats
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-stats:
    name: Update Download Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Update download stats
        run: python scripts/update_download_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish stats to download-stats branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Preserve the generated artifacts; switching branches wipes the working tree.
          tmp="$(mktemp -d)"
          cp -r docs/badges "$tmp/badges"
          cp docs/downloads-chart.svg "$tmp/chart.svg"

          # Check out the dedicated, unprotected branch (creating it on first run).
          # main is protection-gated and rejects direct bot pushes, so generated
          # artifacts live on download-stats and are served via raw.githubusercontent.
          if git ls-remote --exit-code --heads origin download-stats >/dev/null 2>&1; then
            git fetch origin download-stats
            git checkout -f -B download-stats FETCH_HEAD
          else
            git checkout -f --orphan download-stats
            git rm -rf --cached . >/dev/null 2>&1 || true
            git clean -fdx >/dev/null 2>&1 || true
          fi

          # Restore the artifacts and publish.
          mkdir -p docs/badges
          cp "$tmp/badges/"*.json docs/badges/
          cp "$tmp/chart.svg" docs/downloads-chart.svg
          git add docs/badges docs/downloads-chart.svg
          git diff --cached --quiet || git commit -m "chore: update download stats"
          git push origin download-stats
