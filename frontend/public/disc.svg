<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="discGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Disc body -->
  <circle cx="50" cy="50" r="45" fill="url(#discGrad)" opacity="0.9"/>
  <!-- Track rings -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <!-- Navy center hub -->
  <circle cx="50" cy="50" r="14" fill="#0a0a1a"/>
  <!-- Brain outline — left arc (cyan) -->
  <path d="M48 38 C 42 38, 36 42, 36 50 C 36 58, 42 62, 48 62" stroke="#22d3ee" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Brain outline — right arc (magenta) -->
  <path d="M52 38 C 58 38, 64 42, 64 50 C 64 58, 58 62, 52 62" stroke="#ec4899" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="2" fill="#22d3ee" filter="url(#glow)"/>
</svg>
