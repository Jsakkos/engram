<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="holoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="25%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:0.8" />
      <stop offset="75%" style="stop-color:#f59e0b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer Disc Ring — holographic rainbow -->
  <circle cx="50" cy="50" r="46" stroke="url(#holoGrad)" stroke-width="2.5" filter="url(#glow-strong)" />
  <circle cx="50" cy="50" r="43" stroke="url(#holoGrad)" stroke-width="0.5" opacity="0.3" />

  <!-- Inner Tech Rings -->
  <circle cx="50" cy="50" r="38" stroke="#22d3ee" stroke-width="0.5" opacity="0.25" stroke-dasharray="4 2" />
  <circle cx="50" cy="50" r="33" stroke="#ec4899" stroke-width="0.5" opacity="0.25" stroke-dasharray="3 3" />

  <!-- Left Brain Lobe — cyan -->
  <path d="M48 28 C 38 28, 26 36, 26 50 C 26 64, 38 72, 48 72 Z"
    stroke="url(#cyanGrad)" stroke-width="2" fill="#06b6d4" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Right Brain Lobe — magenta -->
  <path d="M52 28 C 62 28, 74 36, 74 50 C 74 64, 62 72, 52 72 Z"
    stroke="url(#magentaGrad)" stroke-width="2" fill="#ec4899" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Brain midline -->
  <line x1="50" y1="27" x2="50" y2="73" stroke="#a78bfa" stroke-width="0.5" opacity="0.4" />

  <!-- Synapse Connections inside Brain -->
  <path d="M38 42 L 62 42" stroke="#22d3ee" stroke-width="1" opacity="0.7" />
  <path d="M36 50 L 64 50" stroke="#a78bfa" stroke-width="0.8" opacity="0.5" />
  <path d="M38 58 L 62 58" stroke="#ec4899" stroke-width="1" opacity="0.7" />
  <path d="M48 34 L 52 34" stroke="#22d3ee" stroke-width="1" opacity="0.8" />
  <path d="M48 66 L 52 66" stroke="#ec4899" stroke-width="1" opacity="0.8" />

  <!-- Cardinal Circuit Traces -->
  <path d="M50 26 L 50 12" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M50 74 L 50 88" stroke="#ec4899" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M74 50 L 88 50" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M26 50 L 12 50" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>

  <!-- PCB-style 90° diagonal traces — cyan (left) -->
  <polyline points="32,36 22,36 22,22" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.7" filter="url(#glow)" />
  <circle cx="22" cy="22" r="2" fill="#22d3ee" opacity="0.9" filter="url(#glow)" />

  <polyline points="32,64 18,64 18,82" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.6" />
  <circle cx="18" cy="82" r="1.5" fill="#22d3ee" opacity="0.8" />

  <!-- PCB-style 90° diagonal traces — amber/orange (right) -->
  <polyline points="68,36 78,36 78,22" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.7" filter="url(#glow)" />
  <circle cx="78" cy="22" r="2" fill="#f59e0b" opacity="0.9" filter="url(#glow)" />

  <polyline points="68,64 82,64 82,82" stroke="#f59e0b" stroke-width="1" fill="none" opacity="0.6" />
  <circle cx="82" cy="82" r="1.5" fill="#f59e0b" opacity="0.8" />

  <!-- Extra trace nodes for PCB detail -->
  <polyline points="36,30 36,18 28,18" stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.5" />
  <circle cx="28" cy="18" r="1.2" fill="#22d3ee" opacity="0.7" />

  <polyline points="64,30 64,18 72,18" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.5" />
  <circle cx="72" cy="18" r="1.2" fill="#f59e0b" opacity="0.7" />

  <!-- Center hub dot -->
  <circle cx="50" cy="50" r="3" fill="#0a0a1a" stroke="#a78bfa" stroke-width="0.8" opacity="0.6" />
  <circle cx="50" cy="50" r="1.2" fill="#22d3ee" opacity="0.9" />
</svg>
